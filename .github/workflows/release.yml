name: Release

# Publishes to the stores when a version tag is pushed (e.g. v2.0.0), or when
# run manually. Each store step is skipped unless its secrets are configured,
# so this works with Chrome only, Firefox only, or any combination.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Chrome Web Store
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
      # Firefox Add-ons (AMO)
      FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
      FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
      FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
      # Microsoft Edge Add-ons
      EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
      EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
      EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Bump the version and re-tag."
            exit 1
          fi

      - name: Type-check
        run: npm run compile

      - name: Zip (Chrome)
        run: npm run zip

      - name: Zip (Firefox + sources)
        run: npm run zip:firefox

      - name: Zip (Edge)
        run: npm run zip:edge

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dad-joke-${{ github.ref_name }}
          path: .output/*.zip
          if-no-files-found: error
          include-hidden-files: true

      - name: Publish to Chrome Web Store
        if: env.CHROME_CLIENT_ID != ''
        run: npm run submit:chrome

      - name: Publish to Firefox Add-ons
        if: env.FIREFOX_JWT_ISSUER != ''
        run: npm run submit:firefox

      - name: Publish to Edge Add-ons
        if: env.EDGE_PRODUCT_ID != ''
        run: npm run submit:edge
